<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <img src="https://static.vecteezy.com/system/resources/previews/026/721/197/original/washing-machine-and-laundry-laundry-sticker-png.png" alt="washing machine">
    </div>

   
    <div class="right">
        <div class="form-box">
            <h1>Hello Again!</h1>
            <p>Welcome back! we missed you!</p>

            <form>
                <label>Email</label>
                <input type="email" placeholder="Emailid@site.com">

                <label>Password</label>
                <input type="password" placeholder="Password">

                <div class="forgot">
                    <a href="#">Forgot Password</a>
                </div>

                <button type="submit">Login</button>

                <p class="register">
                    Not a member? <a href="#">Register Now</a>
                </p>
            </form>
        </div>
    </div>

</div>

</body>
</html>
